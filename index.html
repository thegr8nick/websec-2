<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода и Карта</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>
            <span>🌤️</span>
            Прогноз по городам
        </h1>

        <div class="search-box">
            <input type="text" class="search-input" id="citySearch" placeholder="Поиск среди 1000 городов..." autocomplete="off">
            <div class="search-results" id="searchResults"></div>
        </div>

        <div id="map"></div>

        <div id="emptyState" class="empty-state">
            <div class="empty-icon">🗺️</div>
            <div class="empty-title" style="font-size: 18px; margin-bottom: 8px;">Выберите город на карте</div>
            <div class="empty-desc" style="opacity: 0.7;">Или воспользуйтесь поиском выше</div>
        </div>

        <div id="loadingState" class="loading" style="display: none;">
            <div>⏳ Загружаем данные...</div>
        </div>

        <div id="errorState" class="error" style="display: none;">
            <div>❌ Произошла ошибка</div>
            <div style="font-size: 12px; margin-top: 8px;">Проверьте подключение и файл городов</div>
        </div>

        <div id="weatherContent" style="display: none;">
            <div class="city-info">
                <div class="city-name-large" id="cityName">—</div>
                <div class="city-details" id="cityDetails">—</div>
            </div>

            <div class="current-weather">
                <div class="temp-main" id="currentTemp">—°</div>
                <div class="weather-desc" id="weatherDesc">—</div>
                <div class="details-row">
                    <div class="detail-card">
                        <div class="detail-label">ОСАДКИ</div>
                        <div class="detail-value"><span id="currentPrecip">—</span><span class="detail-unit">мм</span></div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-label">ВЕТЕР</div>
                        <div class="detail-value"><span id="currentWind">—</span><span class="detail-unit">км/ч</span></div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-label">ВЛАЖНОСТЬ</div>
                        <div class="detail-value"><span id="currentHumidity">—</span><span class="detail-unit">%</span></div>
                    </div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="weatherChart"></canvas>
            </div>

            <div class="forecast-title">📅 Прогноз на 7 дней</div>
            <div class="forecast-list" id="forecastList"></div>
        </div>

        <div class="footer">
            Данные: Open-Meteo • 1000 крупнейших городов РФ
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
